# /etc/nginx/sites-available/masters.conf
# After placing — `sudo ln -s /etc/nginx/sites-available/masters.conf /etc/nginx/sites-enabled/`,
# then `sudo nginx -t && sudo systemctl reload nginx`.
#
# HTTPS блок появится автоматически после `sudo certbot --nginx -d masters.infoseledka.ru`.

server {
    listen 80;
    listen [::]:80;
    server_name masters.infoseledka.ru;

    # Where Vite build output lives.
    root /var/www/masters/dist;
    index index.html;

    # Reasonable client limits.
    client_max_body_size 4M;

    # Hashed Vite assets — long cache, immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images and other static files in /public — short cache so updates propagate.
    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Admin API — proxy to local Express. Port 3001 is taken by another project
    # on this server, so the API listens on 3010 (see systemd unit Environment=PORT).
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every other path returns index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression for HTML / JS / CSS / JSON / SVG.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
